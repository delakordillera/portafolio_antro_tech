{% extends 'ecommerce/base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4 p-4">
                <div class="card-body">
                    <h2 class="fw-bold text-center mb-4"><i class="bi bi-person-plus text-primary"></i> Crear Cuenta</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mt-3">
                            Registrarme ahora
                        </button>
                    </form>
                    <div class="mt-4 text-center small">
                        ¿Ya tienes cuenta? <a href="{% url 'user_login' %}" class="fw-bold">Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilo rápido para que el formulario de Django se vea bien con Bootstrap */
    form p input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 50px; /* Redondeado como tu estilo */
        margin-bottom: 1rem;
    }
</style>
{% endblock %}
